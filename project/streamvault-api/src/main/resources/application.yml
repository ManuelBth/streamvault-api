spring:
  application:
    name: streamvault-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    baseline-on-migrate: true
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

app:
  jwt:
    access-token-expiration: 900000    # 15 minutos en ms
    refresh-token-expiration: 604800000  # 7 días en ms
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  upload:
    temp-dir: /tmp/streamvault-uploads
    max-file-size: 10737418240  # 10GB
  rate-limit:
    auth-requests-per-minute: 100
    mail-per-hour: 5
  default-role: ROLE_USER

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
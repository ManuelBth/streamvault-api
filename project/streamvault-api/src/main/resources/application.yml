spring:
  application:
    name: streamvault-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  r2dbc:
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:Junos123}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

app:
  jwt:
    access-token-expiration: 900000    # 15 minutos en ms
    refresh-token-expiration: 604800000  # 7 días en ms
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  upload:
    temp-dir: /tmp/streamvault-uploads
    max-file-size: 10737418240  # 10GB
  rate-limit:
    auth-requests-per-minute: 100
    mail-per-hour: 5
  default-role: ROLE_USER

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.betha.streamvault: DEBUG
